<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Andrew Hallworth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Figtree', sans-serif;
  }

  .scene {
    width: 100vw; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1400px;
    background: #000;
  }

  .card-wrap {
    position: relative; z-index: 10;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .card {
    width: min(92vw, 390px);
    aspect-ratio: 9/16;
    max-height: 92vh;
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow:
      0 0 0 1px #000,
      0 40px 100px rgba(0,0,0,0.95);
    transform-style: preserve-3d;
  }

  /* Photo — top 52% */
  .photo-area {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52%;
    overflow: hidden;
  }
  .photo-area img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: grayscale(100%) contrast(1.08) brightness(0.78);
    display: block;
  }
  .photo-fade {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(12,12,12,0) 15%,
      rgba(12,12,12,0.15) 55%,
      rgba(12,12,12,1) 100%
    );
  }

  /* Content */
  .content {
    position: absolute;
    top: 52%;
    left: 0; right: 0; bottom: 0;
    padding: 18px 24px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 10;
  }

  /* Name block */
  .name-block {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Eyebrow pill — matches site's tag style */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Figtree', sans-serif;
    font-weight: 400;
    font-size: clamp(8px, 2vw, 9.5px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  .eyebrow::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    flex-shrink: 0;
  }

  /* First name — massive, heavy, tight — matches site hero weight */
  .first-name {
    font-family: 'Figtree', sans-serif;
    font-weight: 900;
    font-size: clamp(46px, 13vw, 60px);
    letter-spacing: -0.03em;
    color: #fff;
    line-height: 0.88;
    display: block;
  }

  /* Last name — outline ghost treatment, like site's "vehicle." */
  .last-name {
    font-family: 'Figtree', sans-serif;
    font-weight: 900;
    font-size: clamp(46px, 13vw, 60px);
    letter-spacing: -0.03em;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.2);
    line-height: 0.88;
    display: block;
  }

  /* Title */
  .title-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 5px 12px;
    width: fit-content;
  }
  .title-pill span {
    font-family: 'Figtree', sans-serif;
    font-weight: 400;
    font-size: clamp(8.5px, 2.2vw, 10px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .title-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
  }

  /* Contact list */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 11px;
    text-decoration: none;
  }
  .contact-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .contact-icon svg {
    width: 12px; height: 12px;
    stroke: rgba(255,255,255,0.38);
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .contact-text {
    font-family: 'Figtree', sans-serif;
    font-weight: 300;
    font-size: clamp(10px, 2.8vw, 12.5px);
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.01em;
  }

  /* Bottom row */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  /* Ghost monogram — heavy like site */
  .monogram {
    font-family: 'Figtree', sans-serif;
    font-weight: 900;
    font-size: clamp(58px, 16vw, 78px);
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.06);
    line-height: 1;
    letter-spacing: -0.04em;
    user-select: none;
  }

  /* QR */
  .qr-block {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .qr-block img {
    width: 62px; height: 62px;
    border-radius: 5px;
    filter: invert(1);
    opacity: 0.8;
  }
  .qr-label {
    font-family: 'Figtree', sans-serif;
    font-weight: 300;
    font-size: 7px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  /* Reflection sheen */
  .sheen {
    position: absolute; inset: 0; z-index: 50;
    border-radius: 24px;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* Grain */
  .grain {
    position: absolute; inset: 0; z-index: 48; border-radius: 24px;
    pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' fill='white'/%3E%3C/svg%3E");
    background-size: 120px 120px;
  }
</style>
</head>

<script>
const wrap = document.getElementById('cardWrap');
const sheen = document.getElementById('sheen');

let cx = 0, cy = 0, tx = 0, ty = 0;
let gyro = false;

function lerp(a, b, t) { return a + (b - a) * t; }

(function loop() {
  cx = lerp(cx, tx, 0.07);
  cy = lerp(cy, ty, 0.07);
  wrap.style.transform = `rotateX(${cy}deg) rotateY(${cx}deg)`;

  const a = Math.atan2(cy, cx) * (180/Math.PI) + 135;
  const mag = Math.sqrt(cx*cx + cy*cy) / 20;
  const peak = 0.04 + mag * 0.08;
  sheen.style.background = `linear-gradient(${a}deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,${peak}) 50%, rgba(255,255,255,${peak*0.35}) 58%, rgba(255,255,255,0) 72%)`;

  requestAnimationFrame(loop);
})();

function onOrientation(e) {
  gyro = true;
  tx = Math.max(-18, Math.min(18, (e.gamma || 0) * 0.75));
  ty = Math.max(-18, Math.min(18, ((e.beta || 45) - 45) * 0.5));
}

function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') window.addEventListener('deviceorientation', onOrientation);
    }).catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }
}

document.addEventListener('mousemove', e => {
  if (gyro) return;
  tx = ((e.clientX - innerWidth/2) / (innerWidth/2)) * 14;
  ty = -((e.clientY - innerHeight/2) / (innerHeight/2)) * 14;
});
document.addEventListener('mouseleave', () => { if (!gyro) { tx = 0; ty = 0; } });

let t0x, t0y;
document.addEventListener('touchstart', e => {
  t0x = e.touches[0].clientX; t0y = e.touches[0].clientY;
  requestGyro();
}, {passive: true});
document.addEventListener('touchmove', e => {
  if (gyro) return;
  tx = Math.max(-14, Math.min(14, (e.touches[0].clientX - t0x) * 0.25));
  ty = Math.max(-14, Math.min(14, -(e.touches[0].clientY - t0y) * 0.25));
}, {passive: true});
document.addEventListener('touchend', () => { if (!gyro) { tx = 0; ty = 0; } });

let last = Date.now(), θ = 0;
document.addEventListener('mousemove', () => last = Date.now());
document.addEventListener('touchstart', () => last = Date.now());
setInterval(() => {
  if (!gyro && Date.now() - last > 3000) {
    θ += 0.012; tx = Math.sin(θ) * 4; ty = Math.cos(θ * 0.6) * 2.5;
  }
}, 16);
</script>
</body>
</html>
