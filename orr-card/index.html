<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Andrew Hallworth · Orr &amp; Associates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Jost', sans-serif;
  }
  .scene {
    width: 100vw; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1400px;
    background: #000;
  }
  .card-wrap {
    position: relative; z-index: 10;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .card {
    width: min(92vw, 390px);
    aspect-ratio: 9/16;
    max-height: 92vh;
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    background: #0c0c0c;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 0 0 1px #000,
      0 40px 100px rgba(0,0,0,0.95),
      0 0 80px rgba(255,255,255,0.015);
    transform-style: preserve-3d;
  }
  /* Photo — top 56% */
  .photo-area {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56%;
    overflow: hidden;
  }
  .photo-area img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    /* Color — contrast/brightness only, no grayscale */
    filter: contrast(1.08) brightness(0.88) saturate(1.1);
    display: block;
  }
  .photo-fade {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(12,12,12,0) 20%,
      rgba(12,12,12,0.2) 60%,
      rgba(12,12,12,1) 100%
    );
  }
  /* Thin rule */
  .rule {
    position: absolute;
    top: calc(56% - 1px);
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.12);
    z-index: 20;
  }
  /* Content */
  .content {
    position: absolute;
    top: 56%;
    left: 0; right: 0; bottom: 0;
    padding: 18px 28px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 10;
  }
  .name-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(8px, 2vw, 9.5px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(30px, 8.5vw, 40px);
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 0.95;
  }
  .name em {
    font-style: italic;
    color: rgba(255,255,255,0.75);
  }
  .title-block {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 4px;
  }
  .title {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(9px, 2.4vw, 11px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .badge-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }
  .badge-text {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(7.5px, 2vw, 9px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }
  /* Contact list */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .contact-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .contact-icon svg {
    width: 13px; height: 13px;
    stroke: rgba(255,255,255,0.5);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .contact-text {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(10px, 2.7vw, 12.5px);
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.03em;
  }
  /* Bottom row */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  /* Monogram */
  .monogram {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(52px, 15vw, 70px);
    color: rgba(255,255,255,0.05);
    line-height: 1;
    user-select: none;
    letter-spacing: -0.02em;
  }
  /* QR */
  .qr-block {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .qr-frame {
    width: 70px; height: 70px;
    border-radius: 6px;
    overflow: hidden;
    opacity: 0.88;
  }
  .qr-frame img {
    width: 100%; height: 100%;
    display: block;
  }
  .qr-label {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 7px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  /* Corner marks */
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    z-index: 30;
    pointer-events: none;
  }
  .corner.tl { top: 14px; left: 14px; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
  .corner.br { bottom: 14px; right: 14px; border-bottom: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
  /* Sheen */
  .sheen {
    position: absolute; inset: 0; z-index: 50;
    border-radius: 24px;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
    transition: background 0.06s linear;
    mix-blend-mode: screen;
  }
  /* Noise grain */
  .grain {
    position: absolute; inset: 0; z-index: 48; border-radius: 24px;
    pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' fill='white'/%3E%3C/svg%3E");
    background-size: 120px 120px;
  }
</style>
</head>

<script>
const wrap = document.getElementById('cardWrap');
const sheen = document.getElementById('sheen');
let cx = 0, cy = 0, tx = 0, ty = 0;
let gyro = false;
function lerp(a, b, t) { return a + (b - a) * t; }
(function loop() {
  cx = lerp(cx, tx, 0.07);
  cy = lerp(cy, ty, 0.07);
  wrap.style.transform = `rotateX(${cy}deg) rotateY(${cx}deg)`;
  const a = Math.atan2(cy, cx) * (180/Math.PI) + 135;
  const mag = Math.sqrt(cx*cx + cy*cy) / 20;
  const peak = 0.05 + mag * 0.09;
  sheen.style.background = `linear-gradient(${a}deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 38%, rgba(255,255,255,${peak}) 50%, rgba(255,255,255,${peak * 0.4}) 58%, rgba(255,255,255,0) 72%, rgba(255,255,255,0) 100%)`;
  requestAnimationFrame(loop);
})();
function onOrientation(e) {
  gyro = true;
  tx = Math.max(-18, Math.min(18, (e.gamma || 0) * 0.75));
  ty = Math.max(-18, Math.min(18, ((e.beta || 45) - 45) * 0.5));
}
function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') window.addEventListener('deviceorientation', onOrientation);
    }).catch(() => {});
  } else {
    window.addEventListener('deviceorientation', onOrientation);
  }
}
document.addEventListener('mousemove', e => {
  if (gyro) return;
  tx = ((e.clientX - innerWidth/2) / (innerWidth/2)) * 14;
  ty = -((e.clientY - innerHeight/2) / (innerHeight/2)) * 14;
});
document.addEventListener('mouseleave', () => { if (!gyro) { tx = 0; ty = 0; } });
let t0x, t0y;
document.addEventListener('touchstart', e => {
  t0x = e.touches[0].clientX; t0y = e.touches[0].clientY;
  requestGyro();
}, {passive: true});
document.addEventListener('touchmove', e => {
  if (gyro) return;
  tx = Math.max(-14, Math.min(14, (e.touches[0].clientX - t0x) * 0.25));
  ty = Math.max(-14, Math.min(14, -(e.touches[0].clientY - t0y) * 0.25));
}, {passive: true});
document.addEventListener('touchend', () => { if (!gyro) { tx = 0; ty = 0; } });
let last = Date.now(), theta = 0;
document.addEventListener('mousemove', () => last = Date.now());
document.addEventListener('touchstart', () => last = Date.now());
setInterval(() => {
  if (!gyro && Date.now() - last > 3000) {
    theta += 0.012;
    tx = Math.sin(theta) * 4;
    ty = Math.cos(theta * 0.6) * 2.5;
  }
}, 16);
</script>
